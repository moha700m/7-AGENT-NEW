<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور — Agent Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#eefbf4', 100:'#d6f5e3', 500:'#10b981', 600:'#0d9668', 700:'#0a7a56', 900:'#064e38' },
        night: { 800:'#0f172a', 900:'#0b1120' },
        gold: '#d4af37'
      },
      fontFamily: {
        head: ['Tajawal','sans-serif'],
        body: ['"IBM Plex Sans Arabic"','sans-serif']
      }
    }
  }
}
</script>
</head>
<body class="font-body bg-night-900 text-slate-800 antialiased min-h-screen flex flex-col">

<header class="fixed top-0 inset-x-0 z-50 bg-night-900/90 backdrop-blur-md border-b border-white/5">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
    <a href="index.html" class="flex items-center gap-2 font-head font-900 text-2xl text-white">
      <span class="w-9 h-9 rounded-xl bg-brand-500 flex items-center justify-center"><i class="fa-solid fa-robot text-white text-lg"></i></span>
      Agent <span class="text-brand-500">Store</span>
    </a>
  </nav>
</header>

<main class="flex-1 flex items-center justify-center pt-20 pb-10 px-4">
  <div class="hero-glow opacity-30"></div>
  <div class="w-full max-w-md relative z-10">
    <div class="bg-white rounded-3xl shadow-2xl p-8 sm:p-10">
      <div class="text-center mb-8">
        <h1 class="font-head font-900 text-3xl mb-2">استعادة كلمة المرور</h1>
        <p class="text-slate-500">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>
      </div>

      <form id="forgot-form" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-bold text-slate-700 mb-2">البريد الإلكتروني</label>
          <input type="email" id="email" required class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-500 transition" placeholder="example@mail.com" dir="ltr">
        </div>
        
        <button type="submit" id="submit-btn" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-brand-500/20">
          إرسال الرابط
        </button>

        <div id="error-msg" class="hidden p-3 bg-red-50 text-red-600 text-sm font-bold rounded-xl text-center"></div>
        <div id="success-msg" class="hidden p-3 bg-green-50 text-green-600 text-sm font-bold rounded-xl text-center">
          تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.
        </div>
      </form>

      <div class="mt-8 pt-8 border-t border-slate-100 text-center">
        <p class="text-slate-500 text-sm"><a href="login.html" class="text-brand-600 font-bold hover:underline">العودة لتسجيل الدخول</a></p>
      </div>
    </div>
  </div>
</main>

<script src="js/supabase-config.js"></script>
<script>
  const form = document.getElementById('forgot-form');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.add('hidden');
    successMsg.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = 'جارٍ الإرسال...';

    const email = document.getElementById('email').value;

    try {
      await window.SupabaseAPI.resetPassword(email);
      successMsg.classList.remove('hidden');
    } catch (err) {
      errorMsg.textContent = err.message || 'حدث خطأ أثناء إرسال الرابط';
      errorMsg.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'إرسال الرابط';
    }
  });
</script>
</body>
</html>
